<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <table>
        <tr> <!-- a tag th cria o cabecalho da tabela-->
            <th>ID:</th> <!--th cria as colunas-->
            <th>Nome:</th>
            <th>Profissao:</th>
        </tr>
        <tr>
            <td>1</td> <!--td cria as linhas-->
            <td>Dannubia</td>
            <td>Programadora</td>
        </tr>
        <tr>
            <td>2</td> <!--td cria as linhas-->
            <td>Alexia</td>
            <td>Engenheira</td>
        </tr>
    </table>

    <!--Criando uma sessao no site utilizando o div-->
    <div>
        <h2>Titulo da secao</h2>
        <p>Descricao de secao, um texto relacionado a este assunto</p>
        <a href="#">Saber mais</a>
    </div>
    <div>
        <h2>Sobre o Matheus</h2>
        <p>Nome completo</p>
    </div>
</body>
</html>
