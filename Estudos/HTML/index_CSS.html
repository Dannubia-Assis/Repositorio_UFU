<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS</title>
    <!-- 3 - Internal CSS-->
    <style>
        p {
            color: gold;
            font-size: 40px;
        }

    </style>
    <!-- 4 - External CSS -->
    <!-- Cascadind Style Sheets-->
     <link rel="stylesheet" href="CSS/styles.css">
     <link rel="stylesheet" href="CSS/lists.css">
</head>
<body>
    <!-- 1 - Inline CSS-->
     <h1 style="color:blue">Mudar cor com o Inline</h1>
     <h1 style="color:blue">Outro titulo</h1>
    <!--Multiplas regras-->
    <h1 style="color: purple; font-size: 50px; border-bottom: 1px solid red">
        Mudar cor e tamanho da fonte
    </h1>    
    <!--3 - Internal CSS-->
    <p>Eu fui estilizado pelo internal</p>
    <!-- 4 External-->
     <h3>Meu titulo verde</h3>

    <!--Ordem do CSS-->
    <p style="color: red;">Inline</p>
    <p>Ordem do CSS 2</p>

    <!-- 6 - Multiplos CSS-->
    <ul>
        <li>Banana</li>
        <li>Maca</li>
        <li>Abacate</li>

    </ul>
</body>
</html>
